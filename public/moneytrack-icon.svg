<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="18" fill="url(#bgGrad)"/>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="tGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#f97316" flood-opacity="0.45"/>
    </filter>
    <filter id="mGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#14b8a6" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background subtle grid pattern for high tech fintech vibe -->
  <g opacity="0.05">
    <line x1="8" y1="0" x2="8" y2="64" stroke="#ffffff" stroke-width="1"/>
    <line x1="16" y1="0" x2="16" y2="64" stroke="#ffffff" stroke-width="1"/>
    <line x1="24" y1="0" x2="24" y2="64" stroke="#ffffff" stroke-width="1"/>
    <line x1="32" y1="0" x2="32" y2="64" stroke="#ffffff" stroke-width="1"/>
    <line x1="40" y1="0" x2="40" y2="64" stroke="#ffffff" stroke-width="1"/>
    <line x1="48" y1="0" x2="48" y2="64" stroke="#ffffff" stroke-width="1"/>
    <line x1="56" y1="0" x2="56" y2="64" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="8" x2="64" y2="8" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="16" x2="64" y2="16" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="24" x2="64" y2="24" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="32" x2="64" y2="32" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="40" x2="64" y2="40" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="48" x2="64" y2="48" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="56" x2="64" y2="56" stroke="#ffffff" stroke-width="1"/>
  </g>
  <!-- M Emblem -->
  <path d="M 16,48 V 24 L 32,40 L 48,24 V 48" stroke="url(#mGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#mGlow)"/>
  <!-- T Emblem (Overlapping) -->
  <path d="M 12,16 H 52 M 32,16 V 48" stroke="url(#tGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>
